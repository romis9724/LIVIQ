[project]
name = "liviq-db"
version = "0.1.0"
description = "LIVIQ DB — SQLAlchemy 모델·Alembic 마이그레이션·RLS·시드"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg",
    "alembic",
    "pgvector",
    "pydantic-settings",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/liviq_db"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# 커버리지 게이트 80%(docs/09 §4.1) — 로컬·CI 동일. 소스는 liviq_db 패키지만(tests 제외).
addopts = "--cov=liviq_db --cov-report=term-missing --cov-fail-under=80"
markers = [
    "integration: 실 PostgreSQL(testcontainers) 기동이 필요한 통합 테스트",
]

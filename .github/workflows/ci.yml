name: CI

# 코드 게이트 워크플로 (docs/09 §3·§4.1).
# 순서: format → lint → typecheck → test(coverage) → build.
# TS(web·ui·config-ts·api-types)와 Python(api·ai-worker·ai-core·db)을 turbo가 함께 오케스트레이션.
# PR에선 변경 영향 패키지만(--filter=...[origin/main]), main push에선 전체 실행.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 ref의 이전 실행은 취소(PR 연속 푸시 시 중복 낭비 방지).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Code gate (format · lint · typecheck · test · build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # PR: 변경 영향 패키지만. main push: 전체(빈 필터). fetch-depth 0가 origin/main diff의 전제.
      TURBO_FILTER: ${{ github.event_name == 'pull_request' && '--filter=...[origin/main]' || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # turbo ...[origin/main] diff · gitleaks 히스토리 전제

      - name: Fetch main for turbo diff (PR only)
        if: github.event_name == 'pull_request'
        run: git fetch origin main:refs/remotes/origin/main

      # pnpm은 setup-node 캐시(cache: pnpm)보다 먼저 설치돼야 한다.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3 # 루트 package.json packageManager와 일치

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python workspace
        run: uv sync --all-packages # 전 멤버 설치(plain sync는 dev 도구만)

      # ── format ── (Python만: TS용 prettier 미설정. mcp/는 별도 트리라 미탐색)
      - name: Format check (Python)
        run: uv run --no-sync ruff format --check apps packages

      # TODO: TS format(prettier --check) — prettier 도입 후 추가(docs/09 §4.1 TS 게이트)
      # TODO: TS vitest coverage thresholds — 앱 커버리지 실측 후 게이트화(docs/09 §4.1)

      # ── lint → typecheck → test(coverage) → build ── (turbo, TS·Python 공통)
      - name: Lint
        run: pnpm turbo run lint ${{ env.TURBO_FILTER }}

      - name: Typecheck
        run: pnpm turbo run typecheck ${{ env.TURBO_FILTER }}

      - name: Test (coverage)
        run: pnpm turbo run test ${{ env.TURBO_FILTER }}

      - name: Build
        run: pnpm turbo run build ${{ env.TURBO_FILTER }}

      # ── 계약 드리프트 ── (OpenAPI 재생성 후 생성물 diff 0이 아니면 실패, §1.1)
      - name: API contract drift
        run: |
          pnpm generate:api-types
          git diff --exit-code -- packages/api-types/src/generated.ts

      # ── 경로 검증 ── (stale 컨텍스트 링크 차단)
      - name: Context path check
        run: pnpm check:paths

  # E2E 결정론 여정(docs/07 §4, docs/09 §8.2 H2-7). 게이트와 병렬. @llm 여정은
  # 임베딩 LLM 필요라 config grepInvert(process.env.CI)로 제외 — 여기선 LLM 불요.
  e2e:
    name: E2E journeys (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: liviq
          POSTGRES_PASSWORD: liviq
          POSTGRES_DB: liviq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U liviq -d liviq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://liviq:liviq@localhost:5432/liviq
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python workspace
        run: uv sync --all-packages

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Install Playwright browser
        run: pnpm --filter @liviq/e2e exec playwright install --with-deps chromium

      # config가 api·web-resident·web-admin webServer를 기동하고 seed globalSetup이
      # E2E 전용 tenant를 심는다. CI(process.env.CI)라 @llm 여정은 자동 제외.
      - name: Run E2E
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  # 시크릿 스캔은 메인 게이트와 병렬(별도 job). 라이선스 env는 org 전용이라 미주입.
  # TODO: 의존성 취약점 스캔(docs/09 §4) — 이번 범위 아님.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리 스캔 전제
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

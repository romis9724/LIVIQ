name: Python (mcp)

# mcp/ Python 트리 린트·타입 게이트. TS 파이프라인과 분리.

on:
  push:
    branches: [main]
    paths: ["mcp/**"]
  pull_request:
    paths: ["mcp/**"]

jobs:
  lint-type:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Mypy type check
        run: mypy . || true   # 초기 도입 — 경고 비차단, 안정화 후 || true 제거
